name: Benchmark

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build core
        run: pnpm --filter @crucible/core run build
      - name: Run benchmark
        run: pnpm --filter @crucible/core run bench
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-output
          path: bench-output.txt
