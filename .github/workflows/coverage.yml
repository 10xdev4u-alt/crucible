name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Core coverage
        run: pnpm --filter @crucible/core run test -- --coverage --reporter=verbose
      - name: CLI coverage
        run: pnpm --filter @crucible/cli run test -- --coverage --reporter=verbose
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/core/coverage/lcov.info,packages/cli/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
